apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-benchmark-script
  namespace: vibevault
  labels:
    app: productservice
    part-of: vibevault
    purpose: benchmark
data:
  mysql-baseline.js: |
    SCRIPT_PLACEHOLDER
---
apiVersion: batch/v1
kind: Job
metadata:
  name: benchmark-mysql-baseline
  namespace: vibevault
  labels:
    app: productservice
    part-of: vibevault
    purpose: benchmark
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: productservice
        purpose: benchmark
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:latest
          command:
            - k6
            - run
            - --summary-trend-stats=min,avg,med,p(90),p(95),p(99),max
            - --env
            - BASE_URL=http://productservice:80
            - /scripts/mysql-baseline.js
          volumeMounts:
            - name: k6-scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: k6-scripts
          configMap:
            name: k6-benchmark-script

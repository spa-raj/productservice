replicaCount: 2

image:
  repository: productservice
  tag: latest
  pullPolicy: IfNotPresent

containerPort: 8080

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 768Mi

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

config:
  # Leave empty to auto-generate from mysql service name.
  # Override for external DB scenarios.
  # dbUrl: ""
  issuerUri: "http://userservice:8081"
  springProfilesActive: "default"

secrets:
  dbUsername: productuser
  dbPassword: productpass

mysql:
  enabled: true
  image: mysql:8.0
  storage: 1Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 768Mi

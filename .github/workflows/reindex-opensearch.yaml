name: Reindex OpenSearch

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Seed Data"]
    types: [completed]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER_NAME: vibevault-dev
  NAMESPACE: vibevault
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  reindex:
    name: Reindex Products to OpenSearch
    runs-on: ubuntu-latest
    environment: dev
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Port-forward services
        run: |
          kubectl port-forward svc/userservice 8081:80 -n ${{ env.NAMESPACE }} &
          kubectl port-forward svc/productservice 8080:80 -n ${{ env.NAMESPACE }} &
          for i in $(seq 1 15); do
            if curl -s -o /dev/null http://localhost:8081/actuator/health && \
               curl -s -o /dev/null http://localhost:8080/actuator/health; then
              echo "Port-forwards established"
              break
            fi
            echo "Waiting for port-forwards... ($i/15)"
            sleep 2
          done

      - name: Get OAuth2 admin token
        id: auth
        run: |
          set +e
          ADMIN_PASSWORD=$(kubectl get secret userservice-secret -n ${{ env.NAMESPACE }} -o jsonpath='{.data.ADMIN_PASSWORD}' | base64 -d)
          CLIENT_SECRET=$(kubectl get secret userservice-secret -n ${{ env.NAMESPACE }} -o jsonpath='{.data.CLIENT_SECRET}' | base64 -d)
          CLIENT_ID="vibevault-client"
          REDIRECT_URI="https://oauth.pstmn.io/v1/callback"
          SCOPES="openid+profile+email+read+write"
          USERSERVICE="http://localhost:8081"

          COOKIE_JAR=$(mktemp)
          curl -s -c "$COOKIE_JAR" -b "$COOKIE_JAR" -L --max-redirs 1 -o /dev/null \
            "${USERSERVICE}/oauth2/authorize?response_type=code&client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&scope=${SCOPES}"

          CSRF=$(curl -s -c "$COOKIE_JAR" -b "$COOKIE_JAR" "${USERSERVICE}/login" | grep -oP 'name="_csrf".*?value="\K[^"]+')
          ENCODED_PASS=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${ADMIN_PASSWORD}', safe=''))")
          curl -s -D- -o /dev/null -c "$COOKIE_JAR" -b "$COOKIE_JAR" -X POST "${USERSERVICE}/login" \
            -d "username=admin@gmail.com&password=${ENCODED_PASS}&_csrf=${CSRF}" > /dev/null

          AUTH_RESP=$(curl -s -D- -c "$COOKIE_JAR" -b "$COOKIE_JAR" \
            "${USERSERVICE}/oauth2/authorize?response_type=code&client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&scope=${SCOPES}&continue")
          AUTH_LOC=$(echo "$AUTH_RESP" | grep -i "^Location:" | tr -d '\r')

          AUTH_CODE=""
          if echo "$AUTH_LOC" | grep -q "code="; then
            AUTH_CODE=$(echo "$AUTH_LOC" | grep -oP 'code=\K[^&\s]+')
          else
            CONSENT_BODY=$(echo "$AUTH_RESP" | sed '1,/^\r$/d')
            STATE=$(echo "$CONSENT_BODY" | grep -oP 'name="state"[^>]*value="\K[^"]+' || true)
            CONSENT_RESP=$(curl -s -D- -o /dev/null -c "$COOKIE_JAR" -b "$COOKIE_JAR" -X POST "${USERSERVICE}/oauth2/authorize" \
              -d "client_id=${CLIENT_ID}&state=${STATE}&scope=read&scope=profile&scope=write&scope=email")
            CONSENT_LOC=$(echo "$CONSENT_RESP" | grep -i "^Location:" | tr -d '\r')
            AUTH_CODE=$(echo "$CONSENT_LOC" | grep -oP 'code=\K[^&\s]+' || true)
          fi

          TOKEN_RESP=$(curl -s -X POST "${USERSERVICE}/oauth2/token" \
            -u "${CLIENT_ID}:${CLIENT_SECRET}" \
            -d "grant_type=authorization_code" \
            -d "code=${AUTH_CODE}" \
            -d "redirect_uri=${REDIRECT_URI}")
          TOKEN=$(echo "$TOKEN_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])" 2>/dev/null || echo "")

          rm -f "$COOKIE_JAR"
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"
          set -e

          if [[ "$TOKEN" =~ ^eyJ.*\..*\..*$ ]]; then
            echo "Admin token obtained successfully"
          else
            echo "::error::Failed to obtain admin OAuth2 token"
            exit 1
          fi

      - name: Trigger full reindex
        run: |
          echo "Triggering full reindex to OpenSearch..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST http://localhost:8080/admin/index/reindex \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)

          echo "Status: ${STATUS}"
          echo "Response: ${BODY}"

          if [ "$STATUS" != "200" ]; then
            echo "::error::Reindex failed with status ${STATUS}"
            exit 1
          fi

          INDEXED=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('productsIndexed', 'unknown'))" 2>/dev/null || echo "unknown")
          echo "Products indexed: ${INDEXED}"

      - name: Verify search works after reindex
        run: |
          sleep 5
          RESPONSE=$(curl -s -w "\n%{http_code}" "http://localhost:8080/search/products?query=premium&page=0&size=5")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)

          echo "Search status: ${STATUS}"
          TOTAL=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('totalElements', 0))" 2>/dev/null || echo "0")
          echo "Search results: ${TOTAL} products found for 'premium'"

          if [ "$STATUS" != "200" ] || [ "$TOTAL" -eq 0 ]; then
            echo "::warning::Search returned ${TOTAL} results — verify OpenSearch index"
          fi

      - name: Cleanup port-forwards
        if: always()
        run: kill %1 %2 2>/dev/null || true

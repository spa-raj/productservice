apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: productservice-mysql-pvc
  namespace: vibevault
  labels:
    app: productservice-mysql
    part-of: vibevault
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: productservice-mysql
  namespace: vibevault
  labels:
    app: productservice-mysql
    part-of: vibevault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: productservice-mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: productservice-mysql
        part-of: vibevault
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              value: productservice
            - name: MYSQL_USER
              value: productuser
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: productservice-secret
                  key: DB_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: productservice-secret
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 768Mi
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - "127.0.0.1"
                - --protocol=TCP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - "127.0.0.1"
                - --protocol=TCP
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: productservice-mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: productservice-mysql
  namespace: vibevault
  labels:
    app: productservice-mysql
    part-of: vibevault
spec:
  type: ClusterIP
  selector:
    app: productservice-mysql
  ports:
    - port: 3306
      targetPort: 3306
      protocol: TCP

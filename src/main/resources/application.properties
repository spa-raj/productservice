spring.application.name=productservice
productServiceType=productServiceDBImpl
searchServiceType=${SEARCH_SERVICE_TYPE:searchServiceESImpl}
server.port=${PORT}
spring.jpa.hibernate.ddl-auto=validate
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.open-in-view=false

# JPA Configuration
spring.jpa.show-sql=true


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# OAuth resource server configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=${ISSUER_URI}

# Elasticsearch configuration
spring.elasticsearch.uris=${ELASTICSEARCH_URI:http://localhost:9200}

# Actuator configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
